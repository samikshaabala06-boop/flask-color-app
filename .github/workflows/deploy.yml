name: Build and Push to ECR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: docker build -t flask-color-app .

      - name: Tag Docker Image
        run: docker tag flask-color-app:latest 064123638482.dkr.ecr.us-east-1.amazonaws.com/flask-color-app:latest

      - name: Push Docker Image
        run: docker push 064123638482.dkr.ecr.us-east-1.amazonaws.com/flask-color-app:latest
      
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull 064123638482.dkr.ecr.us-east-1.amazonaws.com/flask-color-app:latest
            sudo docker stop flask-color-app || true
            sudo docker rm flask-color-app || true
            sudo docker run -d --name flask-color-app -p 80:5000 -e APP_COLOR=purple 064123638482.dkr.ecr.us-east-1.amazonaws.com/flask-color-app:latest

        